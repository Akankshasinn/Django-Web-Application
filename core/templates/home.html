<head>
    {% load static %}
<link rel="stylesheet" href="{% static 'CSS/style.css' %}">
    <title>My Beautiful Website</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            width: 80%;
            max-width: 700px;
            padding: 50px;
            text-align: center;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        h1 {
            color: #667eea;
            font-size: 45px;
            margin-bottom: 20px;
        }

        p {
            color: #555;
            font-size: 20px;
            margin-bottom: 30px;
        }

        .btn {
            background: #667eea;
            color: white;
            padding: 15px 35px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #764ba2;
        }

        .cards {
            display: flex;
            justify-content: space-around;
            margin-top: 40px;
        }

        .card {
            background: #f5f5f5;
            padding: 20px;
            width: 30%;
            border-radius: 15px;
        }

        .card h3 {
            color: #764ba2;
        }

        .card p {
            font-size: 14px;
        }

    </style>
</head>

<body>
    <nav>
    <a href="/">Home</a>
    <a href="/about/">About</a>
</nav>


</body>
</html>
